name: Build & Publish AsciiDoc PDF

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  ASCIIDOC_FILE: docs/index.adoc
  OUTPUT_DIR: site
  OUTPUT_PDF: inventory.pdf

jobs:
  build:
    name: Build PDF + Upload Artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Verify AsciiDoc entry file exists
        run: |
          if [ ! -f "${ASCIIDOC_FILE}" ]; then
            echo "ERROR: AsciiDoc file not found at ${ASCIIDOC_FILE}"
            echo "Update env.ASCIIDOCTOR_FILE in the workflow if your path is different."
            exit 1
          fi

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install Asciidoctor PDF
        run: gem install asciidoctor asciidoctor-pdf

      - name: Build PDF
        run: |
          mkdir -p "${OUTPUT_DIR}"
          asciidoctor-pdf "${ASCIIDOC_FILE}" -o "${OUTPUT_DIR}/${OUTPUT_PDF}"

      - name: Create landing page for GitHub Pages
        run: |
          cat > "${OUTPUT_DIR}/index.html" <<'EOF'
          <!doctype html>
          <html>
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>Project Docs PDF</title>
              <style>
                body { font-family: system-ui, Arial, sans-serif; margin: 40px; }
                a { font-size: 18px; }
              </style>
            </head>
            <body>
              <h1>Project Documentation</h1>
              <p><a href="inventory.pdf">Open the latest PDF</a></p>
            </body>
          </html>
          EOF

      - name: Upload PDF as workflow artifact
        uses: actions/upload-artifact@v5
        with:
          name: asciidoc-pdf
          path: ${{ env.OUTPUT_DIR }}/${{ env.OUTPUT_PDF }}
          if-no-files-found: error

      # This prepares the "site/" folder for GitHub Pages deployment
      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.OUTPUT_DIR }}

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4